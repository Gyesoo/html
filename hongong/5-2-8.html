<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let id;
        let count = 0;
        id = setInterval(() => {
            document.write(`1초마다 실행됩니다(${count}번째)<br>`);
            count++;
        }, 1 * 1000);

        setTimeout(() => {
            document.write('타이머를 종료합니다.<br>');
            clearInterval(id);
        }, 5 * 1000);
    </script>
</head>
<body>
    
</body>
</html>
