<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 변수를 선언합니다.
        let output = '';

        // 반복문
        for (let i = 1; i < 15; i++) {
            for (let j = 15; j > i; j--) {
                output += ' ';
            }
            for (let k = 0; k < 2 * i - 1; k++) {
                output += '*';
            }
            output += '<br>';
        }

        // 출력합니다.
        document.write('<pre>' + output + '</pre>');
    </script>
</head>
<body>
    
</body>
</html>
