<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function isLeapYear(year) {
            return (year % 4 ===0 && year % 100 !== 0) || (year % 400 === 0);
        }

        document.write(`2020년은 윤년일까? === ${isLeapYear(2020)}<br>`);
        document.write(`2010년은 윤년일까? === ${isLeapYear(2010)}<br>`);
        document.write(`2000년은 윤년일까? === ${isLeapYear(2000)}<br>`);
        document.write(`1900년은 윤년일까? === ${isLeapYear(1900)}`);

    </script>
</head>

</body>
</html>
