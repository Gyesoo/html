<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function divide(a, b) {
            if (b === 0) {
                throw '0으로는 나눌 수 없습니다.';
            }
            return a / b;
        }

        document.write(divide(10, 2));
        document.write('<br>');
        document.write(divide(10, 0));
    </script>
</head>

</body>
</html>
